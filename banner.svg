<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Browser window outline -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="none" stroke="#334155" stroke-width="3"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="360" height="36" rx="12" fill="#334155"/>
    <rect x="0" y="24" width="360" height="12" fill="#334155"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <!-- Content lines (DOM representation) -->
    <rect x="24" y="56" width="180" height="8" rx="4" fill="#22c55e" opacity="0.6"/>
    <rect x="40" y="76" width="140" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <rect x="40" y="96" width="200" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <rect x="24" y="120" width="160" height="8" rx="4" fill="#22c55e" opacity="0.6"/>
    <rect x="40" y="140" width="120" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
    <!-- Arrow indicating automation -->
    <polygon points="300,140 340,170 300,200" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="white">smallright</text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">AI-Friendly Browser Automation</text>

  <!-- Badge -->
  <rect x="480" y="510" width="240" height="36" rx="18" fill="url(#accent)" opacity="0.2"/>
  <text x="600" y="535" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="18" fill="#22c55e">MCP Server  ·  npm</text>
</svg>
